<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Memories - Happy Birthday Vedant! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #080e1c;
      --navy2: #0d1a33;
      --navy3: #112244;
      --gold: #FFD700;
      --gold2: #FFA500;
      --white: #ffffff;
      --soft: #c8d8f0;
      --accent: #4fc3f7;
      --pink: #ff6eb4;
      --green: #6BCB77;
      --card: rgba(255,255,255,0.04);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--navy); font-family:'Nunito',sans-serif; color:var(--white); min-height:100vh; overflow-x:hidden; cursor:none; }

    /* CURSOR */
    .cursor { width:18px;height:18px;background:var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:transform 0.08s; }

    /* FIREWORKS CANVAS */
    #fwCanvas { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0; }

    /* STARS */
    .stars { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1; }
    .star { position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:.15;transform:scale(1)} 50%{opacity:.9;transform:scale(1.5)} }

    /* HERO */
    .hero { position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;padding:60px 20px 40px; }
    .hb-text { font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2.8rem);color:var(--soft);margin-bottom:8px; }
    .big-name { font-family:'Fredoka One',cursive;font-size:clamp(4rem,14vw,6rem);line-height:1;background:linear-gradient(135deg,var(--gold) 0%,#fff 50%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(255,215,0,0.3)); }
    .back-btn { background:linear-gradient(135deg,#1a3a6e,#0d2040);border:1px solid rgba(255,215,0,0.5);color:var(--gold);padding:16px 44px;font-family:'Fredoka One',cursive;font-size:1.15rem;border-radius:50px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 8px 28px rgba(0,0,0,0.5);margin-top:20px; }
    .back-btn:hover { transform:translateY(-4px) scale(1.04);box-shadow:0 16px 48px rgba(255,215,0,0.25); }

    /* MEMORIES GALLERY */
    .gallery-section { position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:0 24px;padding-bottom:80px; }
    .gallery-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px; }
    .gallery-item { background:var(--card);border:1px solid rgba(255,215,0,0.1);border-radius:20px;padding:20px;text-align:center;transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s;position:relative;overflow:hidden; }
    .gallery-item::before { content:'';position:absolute;bottom:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--gold),var(--accent));transform:scaleX(0);transition:transform 0.3s; }
    .gallery-item:hover { transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.5);border-color:rgba(255,215,0,0.3); }
    .gallery-item:hover::before { transform:scaleX(1); }
    .gallery-img { width:100%;height:250px;border-radius:10px;object-fit:cover;margin-bottom:12px;display:none; }
    .gallery-emoji { font-size:4rem;display:block;margin-bottom:12px; }
    .gallery-title { font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--gold);margin-bottom:8px; }
    .gallery-item p { color:rgba(255,255,255,0.55);font-size:0.9rem;line-height:1.5; }

    /* MUSIC FAB */
    .music-fab { position:fixed;bottom:30px;right:30px;z-index:100;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;width:58px;height:58px;border-radius:50%;font-size:1.5rem;cursor:pointer;box-shadow:0 8px 24px rgba(255,215,0,0.5);transition:transform 0.2s;display:flex;align-items:center;justify-content:center; }
    .music-fab:hover { transform:scale(1.12); }
    .music-fab.playing { animation:pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 8px 24px rgba(255,215,0,0.5);} 50%{box-shadow:0 8px 48px rgba(255,215,0,1);} }

    /* TOAST */
    .toast { position:fixed;bottom:105px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(10,22,40,0.95);border:1px solid rgba(255,215,0,0.45);color:var(--gold);padding:12px 28px;border-radius:50px;font-weight:800;font-size:0.9rem;opacity:0;transition:all 0.4s;z-index:200;pointer-events:none;white-space:nowrap; }
    .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

    footer { position:relative;z-index:2;text-align:center;padding-bottom:40px;color:rgba(255,255,255,0.22);font-size:0.82rem; }
    footer span { color:var(--pink); }

    @keyframes fadeUp { 0%{opacity:0;transform:translateY(24px);} 100%{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>

<canvas id="fwCanvas"></canvas>
<div class="cursor" id="cursor"></div>
<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>
<button class="music-fab" id="musicBtn" onclick="toggleMusic()" title="Toggle Birthday Song">🎵</button>

<!-- HERO -->
<section class="hero">
  <div class="hb-text">Our Cherished</div>
  <div class="big-name">Memories</div>
  <button class="back-btn" onclick="window.location.href='index.html'">← Back to Birthday</button>
</section>

<!-- GALLERY -->
<div class="gallery-section">
  <div class="gallery-grid">
    <div class="gallery-item">
      <span class="gallery-emoji">�</span>
      <img class="gallery-img" src="vedant.jpg" alt="Vedant"/>

    </div>
    <div class="gallery-item">
      <span class="gallery-emoji">🎂</span>
      <img class="gallery-img" src="memory2.jpg" alt="Memory 2"/>
    
    </div>
    <div class="gallery-item">
      <span class="gallery-emoji">👨‍👩‍👧</span>
      <img class="gallery-img" src="memory3.jpg" alt="Memory 3"/>

    </div>
    <div class="gallery-item">
      <span class="gallery-emoji">🌟</span>
      <img class="gallery-img" src="memory4.jpg" alt="Memory 4"/>
    </div>
    <div class="gallery-item">
      <span class="gallery-emoji">🎈</span>
      <img class="gallery-img" src="memory5.jpg" alt="Memory 5"/>
    </div>
    <div class="gallery-item">
      <span class="gallery-emoji">🏖️</span>
      <img class="gallery-img" src="memory6.jpg" alt="Memory 6"/>
    </div>
  </div>
</div>

<footer>Made with <span>♥</span> by Vaishnavi · Happy Birthday Vedant! 🎉</footer>

<script>
// ── CURSOR ──────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ── STARS ───────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random()*3+1;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

// ── FIREWORKS ───────────────────────────────────────
const fwCanvas = document.getElementById('fwCanvas');
const ctx = fwCanvas.getContext('2d');
function resizeFW() { fwCanvas.width=window.innerWidth; fwCanvas.height=window.innerHeight; }
resizeFW(); window.addEventListener('resize', resizeFW);

let particles = [];
const fwColors = ['#FFD700','#FFA500','#FF6EB4','#4FC3F7','#c792ea','#c3e88d','#ffffff','#f78c6c','#89ddff'];

function createFirework(x, y) {
  const n = 90 + Math.floor(Math.random()*50);
  const color = fwColors[Math.floor(Math.random()*fwColors.length)];
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI*2/n)*i + Math.random()*0.3;
    const spd = Math.random()*7+1.5;
    particles.push({ x, y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, alpha:1, color, size:Math.random()*3+1, trail:[] });
  }
}

function animateFW() {
  ctx.fillStyle='rgba(8,14,28,0.18)';
  ctx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
  particles = particles.filter(p=>p.alpha>0.02);
  particles.forEach(p => {
    p.trail.push({x:p.x,y:p.y,a:p.alpha});
    if(p.trail.length>7) p.trail.shift();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.vx*=0.99; p.alpha-=0.015;
    p.trail.forEach((t,i)=>{
      ctx.beginPath(); ctx.arc(t.x,t.y,p.size*(i/p.trail.length)*0.5,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.globalAlpha=t.a*(i/p.trail.length)*0.35; ctx.fill();
    });
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.alpha; ctx.fill();
  });
  ctx.globalAlpha=1;
  if(particles.length) requestAnimationFrame(animateFW);
  else ctx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
}

let fwInterval=null;
function burstFireworks(duration=5000) {
  clearInterval(fwInterval);
  const end=Date.now()+duration;
  fwInterval=setInterval(()=>{
    if(Date.now()>end){clearInterval(fwInterval);return;}
    createFirework(Math.random()*fwCanvas.width*0.8+fwCanvas.width*0.1, Math.random()*fwCanvas.height*0.55+60);
  },250);
  animateFW();
}

// ── HAPPY BIRTHDAY TUNE ─────────────────────────────
let audioCtx=null, musicPlaying=false, musicNodes=[];

function playBirthdayTune() {
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  let t=audioCtx.currentTime+0.05;
  musicNodes=[];
  const HB=[
    [261.6,200],[261.6,200],[293.7,400],[261.6,400],[349.2,400],[329.6,800],
    [261.6,200],[261.6,200],[293.7,400],[261.6,400],[392.0,400],[349.2,800],
    [261.6,200],[261.6,200],[523.3,400],[440.0,400],[349.2,400],[329.6,400],[293.7,800],
    [466.2,200],[466.2,200],[440.0,400],[349.2,400],[392.0,400],[349.2,800]
  ];
  HB.forEach(([freq,dur])=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(freq,t);
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.22,t+0.02);
    gain.gain.linearRampToValueAtTime(0.18,t+dur/1000-0.04);
    gain.gain.linearRampToValueAtTime(0,t+dur/1000);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t+dur/1000);
    musicNodes.push(osc);
    t+=dur/1000;
  });
  musicPlaying=true;
  const btn=document.getElementById('musicBtn');
  btn.classList.add('playing'); btn.textContent='🎶';
  const totalDur=HB.reduce((a,[,d])=>a+d,0);
  setTimeout(()=>{ musicPlaying=false; btn.classList.remove('playing'); btn.textContent='🎵'; }, totalDur+400);
}

function stopMusic() {
  musicNodes.forEach(n=>{try{n.stop();}catch(e){}});
  musicNodes=[]; musicPlaying=false;
  const btn=document.getElementById('musicBtn');
  btn.classList.remove('playing'); btn.textContent='🎵';
}

function toggleMusic() {
  if(musicPlaying) stopMusic();
  else playBirthdayTune();
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── GALLERY HANDLING ─────────────────────────────────────
const galleryImgs = document.querySelectorAll('.gallery-img');
galleryImgs.forEach(img => {
  img.onload = () => {
    img.style.display = 'block';
    img.previousElementSibling.style.display = 'none';
  };
  img.onerror = () => {
    img.style.display = 'none';
    img.previousElementSibling.style.display = 'block';
  };
});

// ── AUTO START ────────────────────────────────────────
setTimeout(()=>burstFireworks(6000), 500);
setTimeout(()=>playBirthdayTune(), 800);
</script>
</body>
</html>
